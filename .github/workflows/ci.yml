name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack Copper68k NuGet
        shell: pwsh
        run: .\scripts\nuget\pack-copper68k.ps1

      - name: Build CopperScreen
        run: dotnet build CopperScreen\CopperScreen.csproj --configuration Release

      - name: Build CopperScreen benchmarks
        run: dotnet build CopperScreen.Benchmarks\CopperScreen.Benchmarks.csproj --configuration Release

      - name: Smoke CopperScreen benchmarks
        run: dotnet run --project CopperScreen.Benchmarks\CopperScreen.Benchmarks.csproj --configuration Release -- --smoke

      - name: Test performance analyzer
        run: dotnet test CopperMod.PerformanceAnalyzers.Tests\CopperMod.PerformanceAnalyzers.Tests.csproj --configuration Release

      - name: Test CopperScreen allocation guards
        run: dotnet test CopperScreen.Tests\CopperScreen.Tests.csproj --configuration Release --filter "FullyQualifiedName~Allocation"
